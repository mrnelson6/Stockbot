<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Random Bot">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- rounded die with the app's accent gradient -->
  <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#g)"/>
  <!-- subtle top sheen -->
  <rect x="5" y="5" width="54" height="26" rx="15" fill="#ffffff" opacity="0.12"/>
  <!-- five pips -->
  <g fill="#ffffff">
    <circle cx="20" cy="20" r="5"/>
    <circle cx="44" cy="20" r="5"/>
    <circle cx="32" cy="32" r="5"/>
    <circle cx="20" cy="44" r="5"/>
    <circle cx="44" cy="44" r="5"/>
  </g>
</svg>
